      - paragraph [ref=f2e56]: "Give seats real-player tendencies: pick an archetype or enter HUD stats — ranges are generated by distorting this solve's own equilibrium — then tweak on the grid and APPLY. RE-SOLVE makes the table adjust around them; setting a HERO freezes everyone else so your seat's re-solve becomes a maximum-exploitation strategy. Profile solves run on the CPU engine. Workflow: solve the baseline once, pick archetypes for every seat you want modeled (generation distorts the CURRENT solve, so set them all up before applying), then just SOLVE — pending model changes apply automatically, and a changed table restarts convergence fresh so the grids reflect the new opponents."
